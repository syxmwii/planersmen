name: iOS build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate

      - name: Show Xcode environment
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project Planersmen.xcodeproj \
            -scheme Planersmen \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            build

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Planersmen-app
          path: build/DerivedData/Build/Products/Debug-iphonesimulator/**/*.app
