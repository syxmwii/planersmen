name: iOS build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: |
          brew untap aws/tap || true
          brew install --formula xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate

      - name: Show Xcode environment
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Build iOS archive
        run: |
          xcodebuild \
            -project Planersmen.xcodeproj \
            -scheme Planersmen \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Planersmen.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: Package IPA artifact
        run: |
          mkdir -p build/ipa/Payload
          cp -R "build/Planersmen.xcarchive/Products/Applications/Planersmen.app" build/ipa/Payload/
          cd build/ipa
          zip -r ../Planersmen.ipa Payload

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Planersmen-ipa
          path: build/Planersmen.ipa
